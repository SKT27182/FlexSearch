# =============================================================================
# FlexSearch Application - Docker Compose
# =============================================================================
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flexsearch-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - infra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flexsearch-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - infra-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  infra-network:
    external: true
    name: infra-network
